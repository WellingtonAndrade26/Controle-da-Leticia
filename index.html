<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Esteja no Controle</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">

  <meta name="theme-color" content="#ec4899">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Controle">

  <link rel="apple-touch-icon" href="./images/icon-192.png">
</head>

<body>

  <!-- LOGIN -->
  <section id="loginBox" class="login-screen">
  <div class="login-card">
    <div class="login-banner">
  <img 
    src="./images/banner-controle.png" 
    alt="Controle da Letícia" 
  >
</div>

    <h1>Esteja no Controle</h1>

    <div id="loginForm">
      <p>Entre na sua conta.</p>

      <input 
        type="email" 
        id="loginEmail" 
        placeholder="Email"
      >

      <input 
        type="password" 
        id="loginSenha" 
        placeholder="Senha"
      >

      <button id="btnLogin" type="button">
        Entrar
      </button>

      <button id="btnMostrarCadastro" class="btn-link" type="button">
        Criar nova conta
      </button>
    </div>

    <div id="cadastroForm" class="oculto">
      <p>Crie sua conta.</p>

      <input 
        type="text" 
        id="cadastroNome" 
        placeholder="Nome"
      >

      <input 
        type="email" 
        id="cadastroEmail" 
        placeholder="Email"
      >

      <input 
        type="password" 
        id="cadastroSenha" 
        placeholder="Senha"
      >

      <input 
        type="password" 
        id="cadastroConfirmarSenha" 
        placeholder="Confirmar senha"
      >

      <button id="btnCadastrar" type="button">
        Criar conta
      </button>

      <button id="btnMostrarLogin" class="btn-link" type="button">
        Já tenho conta
      </button>
    </div>

    <small id="loginMensagem"></small>
  </div>
</section>

  <!-- APP -->
  <div id="appConteudo" class="app oculto">

   <header class="hero-banner">
  <img 
    src="./images/banner-controle.png?v=5" 
    alt="Esteja no Controle" 
    class="hero-banner-img"
  >
</header>

<section class="welcome-card">
  <div class="welcome-icon">
    <img src="./images/perfil.png?v=5" alt="" class="welcome-icon-img">
  </div>

  <div class="welcome-text">
    <span id="boasVindasBanner">Bem-vindo(a), Usuário</span>
  </div>
</section>

<button id="btnInstallApp" class="btn-instalar" type="button">
  Instalar App
</button>

    <section class="card filtro-mes">
      <label for="mesSelecionado">Mês selecionado</label>

      <input 
        type="month" 
        id="mesSelecionado"
      >
    </section>

    <!-- VALOR GUARDADO -->
    <section class="card guardado-box">
  <h2>Valor guardado disponível</h2>

  <div class="guardado-total">
    <span>Soma do que sobrou nos meses</span>
    <strong id="valorGuardadoTotal">R$ 0,00</strong>
  </div>
</section>

    <section class="card resumo">
      <h2>Resumo do mês</h2>

      <div class="orcamento-box">
        <label for="orcamentoInput">Orçamento do mês</label>

        <div class="orcamento-linha">
          <input 
            type="number" 
            id="orcamentoInput" 
            placeholder="Ex: 1500" 
            step="0.01"
          >
        </div>

        <div class="botoes-orcamento">
          <button id="btnAdicionarOrcamento" type="button">
            Adicionar
          </button>

          <button id="btnRetirarOrcamento" type="button">
            Retirar
          </button>

          <button id="btnDefinirOrcamento" type="button">
            Definir
          </button>
        </div>
      </div>

      <div class="resumo-valores">
        <div>
          <span>Total gasto</span>
          <strong id="totalGasto">R$ 0,00</strong>
        </div>

        <div>
          <span>Orçamento</span>
          <strong id="orcamentoTotal">R$ 0,00</strong>
        </div>
      </div>

      <div class="saldo-box">
        <span id="textoSaldo">Disponível</span>
        <strong id="saldoRestante">R$ 0,00</strong>
      </div>
    </section>

    <section class="card">
      <h2>Adicionar gasto</h2>

      <form id="formGasto">
        <input 
          type="text" 
          id="descricao" 
          placeholder="Descrição do gasto" 
          required
        >

        <input 
          type="number" 
          id="valor" 
          placeholder="Valor do gasto" 
          step="0.01" 
          required
        >

        <select id="categoria" required>
          <option value="Mercado">Mercado</option>
          <option value="Transporte">Transporte</option>
          <option value="Contas">Contas</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Casa">Casa</option>
          <option value="Outros">Outros</option>
        </select>

        <input 
          type="date" 
          id="data" 
          required
        >

        <button type="submit">
          Salvar gasto
        </button>
      </form>
    </section>

    <section class="card">
      <h2>Onde o dinheiro foi</h2>

      <div id="dashboardCategorias">
        <!-- O resumo por categoria vai aparecer aqui -->
      </div>
    </section>  

    <section class="card">
      <h2>Gastos cadastrados</h2>

      

      <ul id="listaGastos">
        <!-- Os gastos vão aparecer aqui pelo JavaScript -->
      </ul>
    </section>

    <section class="card sair-card">
  <button id="btnSair" class="btn-sair" type="button">
    Sair da conta
  </button>
</section>

  </div>

  <script src="./script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js")
          .then(function () {
            console.log("Service Worker registrado com sucesso.");
          })
          .catch(function (erro) {
            console.log("Erro ao registrar Service Worker:", erro);
          });
      });
    }
  </script>

</body>
</html>
