<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Controle da Letícia</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">

  <meta name="theme-color" content="#ec4899">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Controle">

  <link rel="apple-touch-icon" href="./images/icon-192.png">
</head>

<body>

  <!-- LOGIN -->
  <section id="loginBox" class="login-screen">
    <div class="login-card">
      <img 
        src="./images/Logo-leticia.png" 
        alt="Controle da Letícia" 
        class="login-logo"
      >

      <h1>Controle da Letícia</h1>
      <p>Digite a senha para acessar seu controle financeiro.</p>

      <input 
        type="password" 
        id="senhaApp" 
        placeholder="Senha do app"
      >

      <button id="btnLogin" type="button">
        Entrar
      </button>

      <small id="loginMensagem"></small>
    </div>
  </section>

  <!-- APP -->
  <div id="appConteudo" class="app oculto">

    <header class="topo-banner">
      <img src="./images/Logo-leticia.png" alt="Controle da Letícia">
    </header>

    <button id="btnInstallApp" class="btn-instalar" type="button">
      Instalar App
    </button>

    <section class="card filtro-mes">
      <label for="mesSelecionado">Mês selecionado</label>

      <input 
        type="month" 
        id="mesSelecionado"
      >
    </section>

    <!-- VALOR GUARDADO -->
    <section class="card guardado-box">
      <h2>Valor guardado disponível</h2>

      <div class="guardado-total">
        <span>Total guardado</span>
        <strong id="valorGuardadoTotal">R$ 0,00</strong>
      </div>

      <div class="guardado-form">
        <input 
          type="number" 
          id="valorGuardadoInput" 
          placeholder="Digite um valor" 
          step="0.01"
        >

        <div class="botoes-guardado">
          <button id="btnAdicionarGuardado" type="button">
            Adicionar
          </button>

          <button id="btnRetirarGuardado" type="button">
            Retirar
          </button>

          <button id="btnDefinirGuardado" type="button">
            Definir total
          </button>
        </div>
      </div>
    </section>

    <section class="card resumo">
      <h2>Resumo do mês</h2>

      <div class="orcamento-box">
        <label for="orcamentoInput">Orçamento do mês</label>

        <div class="orcamento-linha">
          <input 
            type="number" 
            id="orcamentoInput" 
            placeholder="Ex: 1500" 
            step="0.01"
          >
        </div>

        <div class="botoes-orcamento">
          <button id="btnAdicionarOrcamento" type="button">
            Adicionar
          </button>

          <button id="btnRetirarOrcamento" type="button">
            Retirar
          </button>

          <button id="btnDefinirOrcamento" type="button">
            Definir
          </button>
        </div>
      </div>

      <div class="resumo-valores">
        <div>
          <span>Total gasto</span>
          <strong id="totalGasto">R$ 0,00</strong>
        </div>

        <div>
          <span>Orçamento</span>
          <strong id="orcamentoTotal">R$ 0,00</strong>
        </div>
      </div>

      <div class="saldo-box">
        <span id="textoSaldo">Disponível</span>
        <strong id="saldoRestante">R$ 0,00</strong>
      </div>
    </section>

    <section class="card">
      <h2>Adicionar gasto</h2>

      <form id="formGasto">
        <input 
          type="text" 
          id="descricao" 
          placeholder="Descrição do gasto" 
          required
        >

        <input 
          type="number" 
          id="valor" 
          placeholder="Valor do gasto" 
          step="0.01" 
          required
        >

        <select id="categoria" required>
          <option value="Mercado">Mercado</option>
          <option value="Transporte">Transporte</option>
          <option value="Contas">Contas</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Casa">Casa</option>
          <option value="Outros">Outros</option>
        </select>

        <input 
          type="date" 
          id="data" 
          required
        >

        <button type="submit">
          Salvar gasto
        </button>
      </form>
    </section>

    <section class="card">
      <h2>Onde o dinheiro foi</h2>

      <div id="dashboardCategorias">
        <!-- O resumo por categoria vai aparecer aqui -->
      </div>
    </section>  

    <section class="card">
      <h2>Gastos cadastrados</h2>

      <ul id="listaGastos">
        <!-- Os gastos vão aparecer aqui pelo JavaScript -->
      </ul>
    </section>

  </div>

  <script src="./script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js")
          .then(function () {
            console.log("Service Worker registrado com sucesso.");
          })
          .catch(function (erro) {
            console.log("Erro ao registrar Service Worker:", erro);
          });
      });
    }
  </script>

</body>
</html>
